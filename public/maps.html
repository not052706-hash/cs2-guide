<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Карты CS2 | CS2 Pro Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f12; font-family: 'Inter', sans-serif; }
    .glass-card {
      background: rgba(43, 45, 49, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid transparent;
      background-clip: padding-box;
      transition: all 0.25s ease;
      position: relative;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(168,85,247,0.3), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .glass-card:hover { transform: scale(1.02); }
    .glass-card:hover::before { background: linear-gradient(135deg, #a855f7, rgba(168,85,247,0.5)); }
    .sidebar-item-active { background: rgba(88,101,242,0.1); border-left: 3px solid #5865f2; }
    .sidebar-item { transition: all 0.2s; }
    .sidebar-item:hover { background: rgba(88,101,242,0.08); }
  </style>
</head>
<body class="text-gray-200">

<div class="flex min-h-screen">
  <aside class="w-72 bg-[#1e1f22] border-r border-[#2b2d31] p-4 sticky top-0 h-screen overflow-y-auto hidden md:block">
    <div class="flex items-center gap-2 mb-8 px-2">
      <div class="w-8 h-8 bg-[#a855f7] rounded-md flex items-center justify-center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M4 4h16v16H4z M4 12h16 M12 4v16"/></svg></div>
      <span class="text-white font-semibold text-lg">CS2 PRO GUIDE</span>
    </div>
    <div class="text-xs font-semibold text-gray-500 uppercase mb-3 px-2">РАЗДЕЛЫ</div>
    <div class="space-y-1">
      <a href="/" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H4a2 2 0 0 1-2-2z"/></svg><span class="text-gray-400 text-sm">Главная</span></a>
      <a href="/tips.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="text-gray-400 text-sm">Советы</span></a>
      <a href="/maps.html" class="sidebar-item-active sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H4a2 2 0 0 1-2-2z"/></svg><span class="text-white text-sm">Карты</span></a>
      <a href="/grenades.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a10 10 0 1 0 10 10M12 2v10l5 5"/></svg><span class="text-gray-400 text-sm">Гранаты</span></a>
      <a href="/mechanics.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v4M12 18v4M4 4l2 2M18 18l2 2M4 20l2-2M18 6l2-2M2 12h4M18 12h4"/><circle cx="12" cy="12" r="3"/></svg><span class="text-gray-400 text-sm">Механика</span></a>
      <a href="/training.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 2 12 12 17 22 12 22 7 12 2"/><line x1="2" y1="17" x2="2" y2="12"/><line x1="22" y1="17" x2="22" y2="12"/></svg><span class="text-gray-400 text-sm">Тренировки</span></a>
      <a href="/reaction.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="text-gray-400 text-sm">Реакция</span></a>
      <a href="/weapons.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 7h10v10H7z M3 3h18v18H3z"/></svg><span class="text-gray-400 text-sm">Оружие</span></a>
      <a href="/economy.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M6 6v12M18 6v12M4 21h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/></svg><span class="text-gray-400 text-sm">Экономика</span></a>
      <a href="/contact.html" class="sidebar-item flex items-center gap-3 px-2 py-2 rounded-md cursor-pointer block"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg><span class="text-gray-400 text-sm">Вопросы</span></a>
    </div>
  </aside>

  <main class="flex-1 p-8">
    <h1 class="text-4xl font-bold text-white mb-2">Гайды по картам</h1>
    <p class="text-gray-400 mb-6">Полные разборы с гранатными линейками, позициями и преаймом</p>
    <div id="maps-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="text-center col-span-3 py-10"><div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-[#a855f7] border-t-transparent"></div><p class="mt-4">Загрузка карт...</p></div>
    </div>
  </main>
</div>

<script>
async function loadMaps() {
  try {
    const res = await fetch('/api/maps');
    const maps = await res.json();
    const container = document.getElementById('maps-container');
    container.innerHTML = '';
    maps.forEach(map => {
      const card = document.createElement('div');
      card.className = 'glass-card rounded-2xl overflow-hidden cursor-pointer group';
      card.onclick = () => alert(`🎯 ${map.name}\n\n💨 Дымы: ${map.smokes}\n\n🎯 Тренировка: ${map.training}\n\n📌 Совет: ${map.tips}`);
      card.innerHTML = `<div class="p-5"><div class="flex justify-between items-start mb-3"><h3 class="text-2xl font-bold text-[#a855f7] group-hover:text-[#c084fc] transition">${map.name}</h3><span class="bg-[#a855f7]/20 text-[#a855f7] px-2 py-1 rounded text-xs">Гранаты</span></div><p class="text-gray-300 mb-3 text-sm">${map.tips}</p><div class="border-t border-gray-700 pt-3 mt-2"><p class="text-xs text-gray-400"><span class="text-[#a855f7]">💨 Дымы:</span> ${map.smokes}</p><p class="text-xs text-gray-400 mt-1"><span class="text-[#a855f7]">🎯 Тренировка:</span> ${map.training}</p></div><div class="mt-3 flex gap-2"><span class="bg-[#a855f7]/20 text-[#a855f7] px-2 py-0.5 rounded text-xs">Линейки</span><span class="bg-[#a855f7]/20 text-[#a855f7] px-2 py-0.5 rounded text-xs">Преайм</span></div></div><div class="bg-gradient-to-r from-[#a855f7]/20 to-transparent p-2 text-center text-sm text-gray-400 group-hover:text-[#a855f7] transition">Нажми для деталей</div>`;
      container.appendChild(card);
    });
  } catch (err) { console.error(err); document.getElementById('maps-container').innerHTML = '<p class="text-center text-red-400 col-span-3">Ошибка загрузки</p>'; }
}
loadMaps();
</script>
</body>
</html>
